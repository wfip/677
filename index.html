<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>لعبة يا رجال67 🐍 - نسخة التنظيف الجذري</title>
    <style>
        body {
            background-color: #4a752c;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
            padding: 10px;
            box-sizing: border-box;
        }
        .top-bar {
            width: 100%;
            max-width: 600px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 5px;
            box-sizing: border-box;
        }
        .game-title {
            color: white;
            font-size: 22px;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        .score-container {
            display: flex;
            align-items: center;
            gap: 8px;
            color: white;
            font-size: 24px;
            font-weight: bold;
        }
        .cheat-toggle {
            background-color: #e67e22;
            color: white;
            border: none;
            padding: 6px 12px;
            font-size: 14px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }
        /* قائمة المطور والتحكم بالتوب 100 */
        .cheat-menu {
            display: none;
            background-color: #2c3e50;
            border: 3px solid #34495e;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            width: 100%;
            max-width: 600px;
            box-sizing: border-box;
            flex-direction: column;
            gap: 12px;
            color: white;
        }
        .cheat-section {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }
        .cheat-section:last-child { border: none; padding-bottom: 0; }
        .cheat-input {
            padding: 6px 10px;
            font-size: 14px;
            border-radius: 4px;
            border: none;
            text-align: center;
            width: 120px;
        }
        .cheat-btn {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
        }
        .cheat-btn.green { background-color: #2ecc71; }
        .cheat-btn.purple { background-color: #9b59b6; }
        .cheat-btn.blue { background-color: #1a73e8; }
        .cheat-btn.black { background-color: #111111; }
        .cheat-btn.orange { background-color: #d35400; }

        .main-container {
            display: flex;
            gap: 15px;
            align-items: flex-start;
            justify-content: center;
            width: 100%;
            max-width: 600px;
        }
        .game-box {
            position: relative;
            border: 6px solid #578a34;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 12px 32px rgba(0,0,0,0.4);
            background-color: #aad751;
            flex-grow: 1;
            max-width: 360px;
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
        }
        .leaderboard {
            width: 200px;
            height: 372px;
            background-color: #3b5c22;
            border: 6px solid #436927;
            border-radius: 12px;
            color: white;
            padding: 12px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            box-shadow: 0 12px 32px rgba(0,0,0,0.4);
        }
        .leaderboard h3 {
            margin: 0 0 8px 0;
            text-align: center;
            font-size: 18px;
            border-bottom: 2px solid #578a34;
            padding-bottom: 6px;
        }
        .score-list {
            overflow-y: auto;
            flex-grow: 1;
        }
        .score-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 4px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 13px;
        }
        .score-item.current-user {
            color: #fff;
            background-color: #1a73e8;
            font-weight: bold;
            border-radius: 4px;
        }

        @media (max-width: 580px) {
            .main-container { flex-direction: column; align-items: center; }
            .game-box { width: 100%; max-width: 340px; }
            .leaderboard { width: 100%; max-width: 340px; height: 130px; }
        }

        /* أزرار الجوال */
        .mobile-controls {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            margin-top: 10px;
            width: 100%;
        }
        @media (pointer: coarse) { .mobile-controls { display: flex; } }
        .row { display: flex; gap: 20px; }
        .btn-touch {
            width: 60px;
            height: 60px;
            background-color: rgba(255, 255, 255, 0.25);
            border: 3px solid white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 26px;
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-touch:active { background-color: rgba(255, 255, 255, 0.5); transform: scale(0.92); }
        
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.75);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            color: white; backdrop-filter: blur(4px); z-index: 10;
        }
        .overlay input {
            padding: 10px; font-size: 16px; border-radius: 6px; border: none;
            margin-bottom: 15px; text-align: center; width: 70%; max-width: 200px;
        }
        .start-btn, .restart-btn, .back-btn {
            background-color: #1a73e8; color: white; border: none;
            padding: 10px 24px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer;
        }
        
        .error-code { font-size: 64px; font-weight: bold; color: #ffd700; margin: 0; }
        .snake-emoji { font-size: 45px; margin: 10px 0; animation: wiggle 2s infinite ease-in-out; }
        @keyframes wiggle {
            0%, 100% { transform: rotate(-10deg); }
            50% { transform: rotate(10deg); }
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="game-title">لعبة يا رجال67 🐍</div>
    <button class="cheat-toggle" onclick="accessDeveloperMenu(event)">وضع المطور ⚙️</button>
    <div class="score-container">
        <span>🍎</span>
        <span id="score">0</span>
    </div>
</div>

<div class="cheat-menu" id="cheatMenu">
    <div class="cheat-section">
        <button class="cheat-btn green" onclick="cheatAddScore(event)">سكور +10 🏆</button>
        <button class="cheat-btn purple" onclick="cheatGrowLength(event)">طول +5 🐍</button>
        <button class="cheat-btn blue" onclick="cheatChangeSpeed(90, event)">سرعة طيارة ⚡</button>
        <button class="cheat-btn" onclick="cheatChangeSpeed(250, event)">سرعة بطيء 🐢</button>
        <button class="cheat-btn purple" onclick="triggerFake404(event)">تجرِبة خطأ 404 ⚠️</button>
        <button class="cheat-btn orange" onclick="clearAllLeaderboard(event)">تصفير القائمة بالكامل 🧹</button>
    </div>
    <div class="cheat-section">
        <input type="text" id="targetPlayerName" class="cheat-input" placeholder="اسم اللاعب">
        <input type="number" id="targetPlayerScore" class="cheat-input" placeholder="السكور الجديد">
        <button class="cheat-btn green" onclick="adminModifyScore(event)">تعديل نتيجته ✏️</button>
        <button class="cheat-btn black" onclick="adminRemovePlayer(event)">طرد نهائي ❌</button>
    </div>
</div>

<div class="main-container">
    <div class="game-box">
        <canvas id="gameCanvas" width="360" height="360"></canvas>
        
        <div class="overlay" id="startScreen">
            <h2 style="margin-bottom:10px; font-size: 22px;">سجل اسمك يا وحش 🔥</h2>
            <input type="text" id="playerNameInput" placeholder="يا رجال67" maxlength="12">
            <button class="start-btn" onclick="initPlayerName(event)">دخول اللعبة 🎮</button>
        </div>

        <div class="overlay" id="gameOverScreen" style="display: none;">
            <h2 id="gameOverText" style="font-size: 22px;">انتهت اللعبة!</h2>
            <button class="restart-btn" onclick="resetGame(event)">إعادة اللعب 🔄</button>
        </div>

        <div class="overlay" id="error404Screen" style="display: none; text-align: center; padding: 10px;">
            <div class="error-code">404</div>
            <div class="snake-emoji">🐍❌</div>
            <h3 style="margin: 5px 0; font-size: 18px;">أفااا! مضيع الطريق يا وحش؟</h3>
            <p style="color: #aad751; font-size: 12px; margin-bottom: 15px;">الصفحة مهيب موجودة، شكله الثعبان أكل الرابط!</p>
            <button class="back-btn" onclick="recoverFrom404(event)">ارجع للعبة يا رجال67 🔄</button>
        </div>
    </div>

    <div class="leaderboard">
        <h3>أفضل 100 لاعب 🏆</h3>
        <div class="score-list" id="scoreList"></div>
    </div>
</div>

<div class="mobile-controls">
    <div class="btn-touch" onmousedown="handleTouch('Up', event)" ontouchstart="handleTouch('Up', event)">⬆️</div>
    <div class="row">
        <div class="btn-touch" onmousedown="handleTouch('Left', event)" ontouchstart="handleTouch('Left', event)">⬅️</div>
        <div class="btn-touch" onmousedown="handleTouch('Right', event)" ontouchstart="handleTouch('Right', event)">➡️</div>
    </div>
    <div class="btn-touch" onmousedown="handleTouch('Down', event)" ontouchstart="handleTouch('Down', event)">⬇️</div>
</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const gridSize = 30; 
    const cols = canvas.width / gridSize;
    const rows = canvas.height / gridSize;

    let snake = [];
    let food = {x: 0, y: 0};
    let dx = 1, dy = 0, nextDx = 1, nextDy = 0;
    let score = 0;
    let gameInterval;
    let playerName = "يا رجال67";
    let speed = 190; 
    let isTardy = false; 

    let leaderBoardData = JSON.parse(localStorage.getItem("snake_real_top100_v2")) || [];

    document.addEventListener("keydown", changeDirection);

    function accessDeveloperMenu(e) {
        if(e) e.preventDefault();
        const menu = document.getElementById("cheatMenu");
        
        if (menu.style.display === "flex") {
            menu.style.display = "none";
        } else {
            const code = prompt("أدخل كود المطور السري لتفعيل الغش:");
            if (code === "67") {
                menu.style.display = "flex";
            } else {
                alert("الكود غلط! مسموح للمطورين فقط ❌");
            }
        }
    }

    // تصفية وحذف المتصفح بالكامل لتنظيف الحسابات القديمة
    function clearAllLeaderboard(e) {
        if(e) e.preventDefault();
        if(confirm("متأكد تبغى تصفر لوحة الصدارة بالكامل وتمسح كل اللاعبين؟")) {
            leaderBoardData = [];
            localStorage.setItem("snake_real_top100_v2", JSON.stringify([]));
            updateLeaderboardView();
            alert("تم تنظيف وتصفير القائمة بنجاح! 🧹");
        }
    }

    // دالة طرد لاعب محدد
    function adminRemovePlayer(e) {
        if(e) e.preventDefault();
        const targetName = document.getElementById("targetPlayerName").value.trim();

        if(!targetName) {
            alert("اكتب اسم اللاعب اللي تبغى تحذفه أولاً!");
            return;
        }

        leaderBoardData = JSON.parse(localStorage.getItem("snake_real_top100_v2")) || [];
        const originalLength = leaderBoardData.length;
        
        leaderBoardData = leaderBoardData.filter(item => item.name !== targetName);

        if(leaderBoardData.length === originalLength) {
            alert("مالقيت لاعب بهذا الاسم في القائمة 🤔");
        } else {
            if (targetName === playerName) {
                isTardy = true; 
            }
            localStorage.setItem("snake_real_top100_v2", JSON.stringify(leaderBoardData));
            updateLeaderboardView();
            alert(`تم طرد اللاعب ${targetName} وحذفه نهائياً!`);
        }
    }

    function adminModifyScore(e) {
        if(e) e.preventDefault();
        const targetName = document.getElementById("targetPlayerName").value.trim();
        const targetScore = parseInt(document.getElementById("targetPlayerScore").value);

        if(!targetName || isNaN(targetScore)) {
            alert("اكتب اسم اللاعب والسكور الجديد أولاً!");
            return;
        }

        leaderBoardData = JSON.parse(localStorage.getItem("snake_real_top100_v2")) || [];
        leaderBoardData = leaderBoardData.filter(item => item.name !== targetName);
        leaderBoardData.push({ name: targetName, score: targetScore });
        
        sortAndSave();
        updateLeaderboardView();
        alert(`تم تعديل سكور ${targetName} إلى ${targetScore} بنجاح!`);
    }

    function triggerFake404(e) {
        if(e) e.preventDefault();
        clearInterval(gameInterval);
        document.getElementById("gameOverScreen").style.display = "none";
        document.getElementById("startScreen").style.display = "none";
        document.getElementById("error404Screen").style.display = "flex";
    }

    function recoverFrom404(e) {
        if(e) e.preventDefault();
        document.getElementById("error404Screen").style.display = "none";
        resetGame(e);
    }

    function cheatAddScore(e) {
        if(e) e.preventDefault();
        score += 10;
        document.getElementById("score").innerText = score;
        updateLiveScore();
    }

    function cheatGrowLength(e) {
        if(e) e.preventDefault();
        const last = snake[snake.length - 1] || {x: 0, y: 0};
        for(let i=0; i<5; i++) { snake.push({x: last.x, y: last.y}); }
    }

    function cheatChangeSpeed(newSpeed, e) {
        if(e) e.preventDefault();
        speed = newSpeed;
        clearInterval(gameInterval);
        gameInterval = setInterval(update, speed);
    }

    function initPlayerName(e) {
        if(e) e.preventDefault();
        const inputVal = document.getElementById("playerNameInput").value.trim();
        if (inputVal !== "") playerName = inputVal;
        document.getElementById("startScreen").style.display = "none";
        
        isTardy = false;
        leaderBoardData = JSON.parse(localStorage.getItem("snake_real_top100_v2")) || [];
        leaderBoardData = leaderBoardData.filter(item => item.name !== playerName);
        leaderBoardData.push({ name: playerName, score: 0 });
        
        sortAndSave();
        resetGameData();
        updateLeaderboardView();
        gameInterval = setInterval(update, speed);
    }

    function resetGameData() {
        snake = [{x: 4, y: 5}, {x: 3, y: 5}, {x: 2, y: 5}];
        dx = 1; dy = 0; nextDx = 1; nextDy = 0;
        score = 0;
        speed = 190;
        document.getElementById("score").innerText = score;
        generateFood();
    }

    function update() {
        dx = nextDx; dy = nextDy;
        let headX = snake[0].x + dx;
        let headY = snake[0].y + dy;

        if (headX < 0) headX = cols - 1;
        if (headX >= cols) headX = 0;
        if (headY < 0) headY = rows - 1;
        if (headY >= rows) headY = 0;

        const head = {x: headX, y: headY};

        if (checkCollision(head)) {
            clearInterval(gameInterval);
            document.getElementById("gameOverText").innerText = `انتهت اللعبة يا ${playerName}! 🎮`;
            document.getElementById("gameOverScreen").style.display = "flex";
            return;
        }

        snake.unshift(head);
        if (head.x === food.x && head.y === food.y) {
            score++;
            document.getElementById("score").innerText = score;
            updateLiveScore();
            generateFood();
        } else {
            snake.pop();
        }
        draw();
    }

    function updateLiveScore() {
        if (isTardy) return; 
        leaderBoardData = JSON.parse(localStorage.getItem("snake_real_top100_v2")) || [];
        leaderBoardData = leaderBoardData.filter(item => item.name !== playerName);
        leaderBoardData.push({ name: playerName, score: score });
        sortAndSave();
        updateLeaderboardView();
    }

    function sortAndSave() {
        leaderBoardData.sort((a, b) => b.score - a.score);
        leaderBoardData = leaderBoardData.slice(0, 100);
        localStorage.setItem("snake_real_top100_v2", JSON.stringify(leaderBoardData));
    }

    function updateLeaderboardView() {
        leaderBoardData = JSON.parse(localStorage.getItem("snake_real_top100_v2")) || [];
        const listContainer = document.getElementById("scoreList");
        listContainer.innerHTML = "";
        leaderBoardData.forEach((item, index) => {
            const itemDiv = document.createElement("div");
            itemDiv.className = "score-item";
            if (item.name === playerName && !isTardy) itemDiv.className += " current-user";
            itemDiv.innerHTML = `<span>#${index + 1} ${item.name}</span><span>${item.score}</span>`;
            listContainer.appendChild(itemDiv);
        });
    }

    document.getElementById("targetPlayerName").addEventListener("keydown", (e) => e.stopPropagation());
    document.getElementById("targetPlayerScore").addEventListener("keydown", (e) => e.stopPropagation());

    function draw() {
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                ctx.fillStyle = (r + c) % 2 === 0 ? "#aad751" : "#a2d149";
                ctx.fillRect(c * gridSize, r * gridSize, gridSize, gridSize);
            }
        }

        const fx = food.x * gridSize, fy = food.y * gridSize, r = gridSize / 2;
        ctx.beginPath(); ctx.arc(fx + r, fy + r, r - 3, 0, Math.PI * 2); ctx.fillStyle = "#e74c3c"; ctx.fill();

        snake.forEach((part, index) => {
            const sx = part.x * gridSize, sy = part.y * gridSize;
            if (index === 0) {
                ctx.fillStyle = "#1a3da1";
                ctx.beginPath(); ctx.arc(sx + r, sy + r, r - 0.5, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = "white";
                ctx.beginPath(); ctx.arc(sx + r + (dx*5), sy + r + (dy*5), 4, 0, Math.PI * 2); ctx.fill();
            } else {
                ctx.fillStyle = index % 2 === 0 ? "#2b59d6" : "#3b6df7";
                ctx.beginPath(); ctx.arc(sx + r, sy + r, r - 2, 0, Math.PI * 2); ctx.fill();
            }
        });
    }

    function changeDirection(event) {
        const key = event.key;
        if (key === "ArrowUp" && dy === 0) { nextDx = 0; nextDy = -1; }
        if (key === "ArrowDown" && dy === 0) { nextDx = 0; nextDy = 1; }
        if (key === "ArrowLeft" && dx === 0) { nextDx = -1; nextDy = 0; }
        if (key === "ArrowRight" && dx === 0) { nextDx = 1; nextDy = 0; }
    }

    function handleTouch(dir, event) {
        if(event) event.preventDefault(); 
        if (dir === "Up" && dy === 0) { nextDx = 0; nextDy = -1; }
        if (dir === "Down" && dy === 0) { nextDx = 0; nextDy = 1; }
        if (dir === "Left" && dx === 0) { nextDx = -1; nextDy = 0; }
        if (dir === "Right" && dx === 0) { nextDx = 1; nextDy = 0; }
    }

    function generateFood() {
        food.x = Math.floor(Math.random() * cols);
        food.y = Math.floor(Math.random() * rows);
    }

    function checkCollision(head) {
        for (let i = 1; i < snake.length; i++) {
            if (snake[i].x === head.x && snake[i].y === head.y) return true;
        }
        return false;
    }

    function resetGame(e) {
        if(e) e.preventDefault();
        document.getElementById("gameOverScreen").style.display = "none";
        document.getElementById("error404Screen").style.display = "none";
        clearInterval(gameInterval);
        isTardy = false;
        resetGameData();
        updateLiveScore();
        gameInterval = setInterval(update, speed);
    }

    // قراءة اللوحة فور التشغيل لضمان المزامنة
    updateLeaderboardView();
</script>
</body>
</html>
