<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خطأ 404 - الصفحة مفقودة 🐍</title>
    <style>
        body {
            background-color: #4a752c;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
            user-select: none;
        }
        .error-container {
            background-color: #3b5c22;
            border: 10px solid #578a34;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 12px 32px rgba(0,0,0,0.4);
            max-width: 400px;
            width: 90%;
        }
        .error-code {
            font-size: 96px;
            font-weight: bold;
            margin: 0;
            color: #ffd700;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .snake-emoji {
            font-size: 64px;
            margin: 20px 0;
            display: inline-block;
            animation: wiggle 2s infinite ease-in-out;
        }
        h2 {
            font-size: 24px;
            margin-bottom: 15px;
        }
        p {
            color: #aad751;
            font-size: 16px;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        .back-btn {
            display: inline-block;
            background-color: #1a73e8;
            color: white;
            text-decoration: none;
            padding: 14px 28px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: all 0.2s ease;
        }
        .back-btn:hover {
            background-color: #1557b0;
            transform: scale(1.05);
        }
        @keyframes wiggle {
            0%, 100% { transform: rotate(-10deg); }
            50% { transform: rotate(10deg); }
        }
    </style>
</head>
<body>

<div class="error-container">
    <div class="error-code">404</div>
    <div class="snake-emoji">🐍❌</div>
    <h2>أفااا! مضيع الطريق يا وحش؟</h2>
    <p>الصفحة اللي تدور عليها مهيب موجودة، شكله الثعبان أكل الرابط وهو جائع!</p>
    <a href="index.html" class="back-btn">ارجع للعبة يا رجال67 🔄</a>
</div>

</body>
</html>
